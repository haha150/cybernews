services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cybernews-backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - db-data:/app/data
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/stats')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: cybernews-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
      - "${HTTPS_PORT:-8443}:443"
    volumes:
      - ${SSL_CERT_DIR:-./certs}:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3

volumes:
  db-data:
